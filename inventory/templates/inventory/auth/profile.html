{% extends 'inventory/base.html' %}

{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-xl">
        <h3 class="text-lg font-bold text-white mb-6 border-b border-slate-800 pb-4">Personal Settings</h3>
        
        <form method="POST" action="{% url 'profile' %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">First Name</label>
                    <input type="text" name="first_name" value="{{ request.user.first_name }}" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Last Name</label>
                    <input type="text" name="last_name" value="{{ request.user.last_name }}" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition text-sm">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" name="email" value="{{ request.user.email }}" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="text" name="phone" value="{{ request.user.phone|default:'' }}" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition text-sm">
                </div>
            </div>

            <div class="border-t border-slate-800 pt-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                    <div>
                        <span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Username</span>
                        <span class="text-white font-mono bg-slate-950 px-3 py-1.5 rounded border border-slate-800 block w-full">{{ request.user.username }}</span>
                    </div>
                    <div>
                        <span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Access Role</span>
                        <span class="text-teal-400 font-bold bg-teal-500/10 px-3 py-1.5 rounded border border-teal-500/20 block w-full">{{ request.user.get_role_display }}</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4 gap-3">
                <a href="{% url 'dashboard' %}" class="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm font-semibold text-slate-300 transition-colors">Cancel</a>
                <button type="submit" class="px-5 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-sm font-semibold text-white shadow-lg shadow-teal-500/15 transition-colors">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
